version: 2

models:
  - name: stg_nyc_taxi_trips
    columns:
      - name: trip_id
        tests:
          - unique
          - not_null
      - name: passenger_count
        tests:
          - not_null
      - name: trip_distance
        tests:
          - not_null
      - name: fare_amount
        tests:
          - not_null


unit_tests:
  - name: test_tip_percentage_calculation
    model: stg_nyc_taxi_trips
    given:
      - input: source('public', 'nyc_taxi_trips')
        rows:
          - trip_id: 1
            pickup_datetime: '2024-01-01 10:00:00'
            dropoff_datetime: '2024-01-01 10:30:00'
            passenger_count: 2
            trip_distance: 5.0
            fare_amount: 100.0
            tip_amount: 20.0
            total_amount: 120.0
            trip_duration_min: 30
            loaded_at: '2024-01-01 10:30:00'
    expect:
      rows:
        - trip_id: 1
          tip_percentage: 20.0