version: 2

models:
  - name: stg_nyc_taxi_trips
    columns:
      - name: trip_id
        tests:
          - unique
          - not_null
      - name: passenger_count
        tests:
          - not_null
      - name: trip_distance
        tests:
          - not_null
      - name: fare_amount
        tests:
          - not_null