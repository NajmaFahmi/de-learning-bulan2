version: 2

models:
  - name: stg_nyc_taxi_trips
    description: "Cleaned and validated NYC taxi trip data.
      Filters out invalid trips (zero passengers, zero 
      distance, zero fare). Adds derived tip_percentage column."
    columns:
      - name: trip_id
        description: "Primary key. Unique identifier for each trip."
        tests:
          - unique
          - not_null
      - name: passenger_count
        description: "Number of passengers. Filtered to exclude zero values."
        tests:
          - not_null
      - name: trip_distance
        description: "Trip distance in miles. Filtered to exclude zero values."
        tests:
          - not_null
      - name: fare_amount
        description: "Base fare amount in USD. Filtered to exclude zero values."
        tests:
          - not_null
      - name: tip_percentage
        description: "Tip as percentage of fare amount. Calculated as 
          (tip_amount / fare_amount) * 100."


unit_tests:
  - name: test_tip_percentage_calculation
    model: stg_nyc_taxi_trips
    given:
      - input: source('public', 'nyc_taxi_trips')
        rows:
          - trip_id: 1
            pickup_datetime: '2024-01-01 10:00:00'
            dropoff_datetime: '2024-01-01 10:30:00'
            passenger_count: 2
            trip_distance: 5.0
            fare_amount: 100.0
            tip_amount: 20.0
            total_amount: 120.0
            trip_duration_min: 30
            loaded_at: '2024-01-01 10:30:00'
    expect:
      rows:
        - trip_id: 1
          tip_percentage: 20.0